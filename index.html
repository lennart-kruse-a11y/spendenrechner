<div style="max-width: 520px; margin: 40px auto; padding: 20px; border: 1px solid #d9d9d9; border-radius: 16px; background: #f8f8f5; box-shadow: 0 6px 18px rgba(0,0,0,0.08); font-family: Arial, sans-serif; color: #2f2f2f; text-align: center;">
  
  <h2 style="margin: 0 0 10px 0; color: #3f4f2a;">Spendenrechner Kitzrettung</h2>
  
  <p style="margin: 0 0 16px 0; font-size: 14px; color: #555;">
    Berechnung auf Basis der Fläche, der Anzahl der Einzelflächen und der Entfernung vom Einsatzort zum Drohnenteam.
  </p>

  <div style="margin-bottom:14px;">
    <label style="font-weight:bold;">Bundesland</label><br>
    <select id="bundesland" style="padding:8px; border-radius:8px; border:1px solid #ccc; width:200px;">
      <option value="bw" selected>Baden-Württemberg</option>
      <option value="by">Bayern</option>
      <option value="be">Berlin</option>
      <option value="bb">Brandenburg</option>
      <option value="hb">Bremen</option>
      <option value="hh">Hamburg</option>
      <option value="he">Hessen</option>
      <option value="mv">Mecklenburg-Vorpommern</option>
      <option value="ni">Niedersachsen</option>
      <option value="nw">Nordrhein-Westfalen</option>
      <option value="rp">Rheinland-Pfalz</option>
      <option value="sl">Saarland</option>
      <option value="sn">Sachsen</option>
      <option value="st">Sachsen-Anhalt</option>
      <option value="sh">Schleswig-Holstein</option>
      <option value="th">Thüringen</option>
    </select>
  </div>

  <div style="display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin-bottom:14px;">
    
    <div style="width:140px;">
      <label style="font-weight:bold;">Gesamtfläche (ha)</label>
      <input type="number" id="hektar" step="0.1" min="0"
             style="width:100%; padding:8px; border-radius:8px; border:1px solid #ccc; box-sizing:border-box;">
    </div>

    <div style="width:140px;">
      <label style="font-weight:bold;">Einzelflächen</label>
      <input type="number" id="flaechen" step="1" min="1"
             style="width:100%; padding:8px; border-radius:8px; border:1px solid #ccc; box-sizing:border-box;">
    </div>

    <div style="width:160px;">
      <label style="font-weight:bold;">Entfernung (km)</label>
      <input type="number" id="kilometer" step="0.1" min="0"
             style="width:100%; padding:8px; border-radius:8px; border:1px solid #ccc; box-sizing:border-box;">
    </div>

  </div>

  <button onclick="berechneSpende()"
          style="width:100%; padding:10px; background:#556b2f; color:white; border:none; border-radius:10px; cursor:pointer;">
    Spende berechnen
  </button>

  <div id="ergebnis" style="margin-top:18px; text-align:left;"></div>
</div>

<script>
const standardConfig = {
  preisMinimal: 3,
  preisEmpfohlen: 4,
  preisUnterstuetzend: 5,
  pauschaleProFlaeche: 10,
  einsatzpauschale: 5,
  kmPreis: 0.40,
  fahrzeuge: 2
};

const config = {
  bw: { ...standardConfig },
  by: { ...standardConfig },
  be: { ...standardConfig },
  bb: { ...standardConfig },
  hb: { ...standardConfig },
  hh: { ...standardConfig },
  he: { ...standardConfig },
  mv: { ...standardConfig },
  ni: { ...standardConfig },
  nw: { ...standardConfig },
  rp: { ...standardConfig },
  sl: { ...standardConfig },
  sn: { ...standardConfig },
  st: { ...standardConfig },
  sh: { ...standardConfig },
  th: { ...standardConfig }
};

function berechneSpende() {
  const hektar = parseFloat(document.getElementById("hektar").value.replace(",", "."));
  const flaechen = parseInt(document.getElementById("flaechen").value, 10);
  const km = parseFloat(document.getElementById("kilometer").value.replace(",", "."));
  const cfg = config[document.getElementById("bundesland").value];

  if (isNaN(hektar) || hektar <= 0 || isNaN(flaechen) || flaechen <= 0 || isNaN(km) || km < 0) {
    document.getElementById("ergebnis").innerHTML = "Bitte gültige Werte eingeben.";
    return;
  }

  function calc(preis) {
    const flaeche = hektar * preis;
    const flaechenKosten = flaechen * cfg.pauschaleProFlaeche;
    const fahrt = km * 2 * cfg.kmPreis * cfg.fahrzeuge;

    return {
      gesamt: flaeche + flaechenKosten + cfg.einsatzpauschale + fahrt,
      flaeche,
      flaechenKosten,
      fahrt,
      pilot: cfg.einsatzpauschale + fahrt,
      verein: flaeche + flaechenKosten
    };
  }

  function euro(x) {
    return x.toFixed(2).replace(".", ",") + " €";
  }

  function zahl(x) {
    return x.toFixed(1).replace(".", ",");
  }

  const m = calc(cfg.preisMinimal);
  const e = calc(cfg.preisEmpfohlen);
  const u = calc(cfg.preisUnterstuetzend);

  document.getElementById("ergebnis").innerHTML =
    "<div style='font-size:18px; font-weight:bold; margin-bottom:10px;'>Spendenempfehlung</div>" +

    "<div style='display:flex; gap:8px; margin-bottom:14px;'>" +

    "<div style='flex:1; background:#b94a48; color:white; border-radius:10px; padding:12px; text-align:center;'>" +
    "<div style='font-size:12px;'>Fair</div><div style='font-weight:bold;'>" + euro(m.gesamt) + "</div></div>" +

    "<div style='flex:1; background:#d6a531; color:white; border-radius:10px; padding:14px; text-align:center;'>" +
    "<div style='font-size:12px;'>Empfohlen</div><div style='font-weight:bold;'>" + euro(e.gesamt) + "</div></div>" +

    "<div style='flex:1; background:#4f7f39; color:white; border-radius:10px; padding:12px; text-align:center;'>" +
    "<div style='font-size:12px;'>Unterstützend</div><div style='font-weight:bold;'>" + euro(u.gesamt) + "</div></div>" +

    "</div>" +

    "<div style='background:white; border:1px solid #ddd; border-radius:12px; padding:12px; margin-bottom:12px;'>" +
    "<div style='font-weight:bold; margin-bottom:6px;'>Zusammensetzung (empfohlen)</div>" +

    "<div style='display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding:4px 0;'>" +
    "<span>" + zahl(hektar) + " ha × 4 €</span><span>" + euro(e.flaeche) + "</span></div>" +

    "<div style='display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding:4px 0;'>" +
    "<span>" + flaechen + " Flächen × 10 €</span><span>" + euro(e.flaechenKosten) + "</span></div>" +

    "<div style='display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding:4px 0;'>" +
    "<span>Einsatzpauschale</span><span>" + euro(cfg.einsatzpauschale) + "</span></div>" +

    "<div style='display:flex; justify-content:space-between; padding:4px 0;'>" +
    "<span>" + zahl(km * 2) + " km × 0,40 € × 2 Fahrzeuge</span><span>" + euro(e.fahrt) + "</span></div>" +

    "</div>" +

    "<div style='background:#f7f3ea; padding:10px; border-radius:10px; margin-bottom:8px;'>" +
    "<b>Direkt vor Ort an den Piloten zahlen</b><br>" + euro(e.pilot) + "</div>" +

    "<div style='background:#eef4ea; padding:10px; border-radius:10px;'>" +
    "<b>Auf das Spendenkonto des Vereins überweisen</b><br>" + euro(e.verein) + "</div>";
}
</script>
